[package]
name = "polycal"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = ["sensorium-tl"]


[dependencies]
ndarray = { version = "0.15", features = ["blas"] }
blas-src = { version = "0.9", features = ["openblas"] }
openblas-src = { version = "0.10", features = ["cblas", "system"] }

argmin = { version = "0.8.1", features = ["_ndarrayl"] }
ndarray-linalg = "0.16.0"
num-traits = "0.2.17"
argmin-math = "0.3.0"
tracing = "0.1.40"
ndarray-rand = "0.14.0"
rand_isaac = "0.3.0"
thiserror = "1.0.62"

[dev-dependencies]
approx = "0.5.1"
